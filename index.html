<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB THE SHOW 26 COOP - PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .card { background-color: #1e293b; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .scoreboard-font { font-family: 'Courier New', Courier, monospace; }
        
        #hr-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; align-items: center; justify-content: center; flex-direction: column;
        }
        .hr-text { font-size: 5rem; font-weight: 900; color: #fbbf24; text-shadow: 0 0 20px #fbbf24; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        .out-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }
        .character-sprite { width: 50px; height: 50px; object-fit: contain; }
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="hr-overlay">
        <div class="hr-text italic">HOME RUN!</div>
        <img src="https://media.giphy.com/media/l0HlOn6UvV8xL5a6k/giphy.gif" class="mt-6 rounded-lg w-64 border-4 border-yellow-500">
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
            <h1 class="text-2xl font-black italic">MLB THE SHOW <span class="text-blue-500">26 COOP</span></h1>
            <div class="flex gap-2 bg-slate-800 p-1 rounded-xl">
                <button onclick="viewSection('game')" id="nav-game" class="px-4 py-2 rounded-lg font-bold transition-all bg-blue-600">Juego</button>
                <button onclick="viewSection('stats')" id="nav-stats" class="px-4 py-2 rounded-lg font-bold transition-all text-slate-400">Estadísticas</button>
                <button onclick="viewSection('setup')" id="nav-setup" class="px-4 py-2 rounded-lg font-bold transition-all text-slate-400">Equipo</button>
            </div>
        </header>

        <div class="card p-4 mb-6 border-b-4 border-blue-600 bg-slate-900">
            <div class="flex justify-around items-center text-center">
                <div>
                    <p class="text-[10px] text-blue-400 font-black">ANOTADAS</p>
                    <span id="score-runs" class="scoreboard-font text-5xl font-bold">0</span>
                </div>
                <div class="bg-slate-800 px-6 py-2 rounded-xl border border-slate-700">
                    <p class="text-[10px] text-slate-400 font-black">INNING</p>
                    <span id="current-inning" class="text-3xl font-black text-yellow-500">1</span>
                </div>
                <div>
                    <p class="text-[10px] text-red-500 font-black">PERMITIDAS</p>
                    <span id="score-allowed" class="scoreboard-font text-5xl font-bold">0</span>
                </div>
            </div>
            <div class="flex justify-center gap-10 mt-4 border-t border-slate-800 pt-4">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold">BATEO:</span>
                    <div id="bat-outs" class="flex gap-1"><div class="out-dot"></div><div class="out-dot"></div><div class="out-dot"></div></div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-red-400">PITCHEO:</span>
                    <div id="pitch-outs" class="flex gap-1"><div class="out-dot"></div><div class="out-dot"></div><div class="out-dot"></div></div>
                </div>
            </div>
        </div>

        <section id="section-game">
            <div class="flex justify-center mb-6">
                <button id="btn-toggle" onclick="toggleGame()" class="px-10 py-3 rounded-full font-black bg-green-600 shadow-lg active:scale-95 transition-all">EMPEZAR PARTIDO</button>
            </div>

            <div id="game-controls" class="opacity-30 pointer-events-none grid grid-cols-1 md:grid-cols-2 gap-6 transition-all">
                <div class="card p-5 border-t-4 border-blue-500">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-black italic">LINEUP</h2>
                        <div id="batter-sprite-container"></div>
                    </div>
                    <select id="activeBatter" onchange="manualUserChange()" class="w-full p-3 mb-4 rounded-lg bg-slate-900 border border-slate-700 font-bold"></select>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="record('bat', 'H', '#22c55e')" class="bg-green-900/30 p-3 rounded font-bold text-green-400 border border-green-500/30">1B</button>
                        <button onclick="record('bat', '2B', '#10b981')" class="bg-emerald-900/30 p-3 rounded font-bold text-emerald-400 border border-emerald-500/30">2B</button>
                        <button onclick="record('bat', '3B', '#f97316')" class="bg-orange-900/30 p-3 rounded font-bold text-orange-400 border border-orange-500/30">3B</button>
                        <button onclick="record('bat', 'HR', '#fbbf24')" class="bg-yellow-900/30 p-3 rounded font-bold text-yellow-400 border border-yellow-500/30">HR</button>
                        <button onclick="record('bat', 'BB', '#3b82f6')" class="bg-blue-900/30 p-3 rounded font-bold text-blue-400 border border-blue-500/30">BB</button>
                        <button onclick="record('bat', 'RBI', '#a855f7')" class="bg-purple-900/30 p-3 rounded font-bold text-purple-400 border border-purple-500/30">RBI</button>
                        <button onclick="record('bat', 'OUT', '#64748b')" class="bg-slate-700 p-3 rounded font-bold">OUT</button>
                        <button onclick="record('bat', 'K', '#ef4444')" class="bg-red-900/30 p-3 rounded font-bold text-red-400 border border-red-500/30">K</button>
                        <button onclick="record('bat', 'E', '#94a3b8')" class="bg-slate-600/30 p-3 rounded font-bold text-slate-300">ERR</button>
                    </div>
                </div>

                <div class="card p-5 border-t-4 border-red-500">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-black italic">BULLPEN</h2>
                        <div id="pitcher-sprite-container"></div>
                    </div>
                    <select id="activePitcher" onchange="manualUserChange()" class="w-full p-3 mb-4 rounded-lg bg-slate-900 border border-slate-700 font-bold"></select>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="record('pitch', 'K', '#ef4444')" class="bg-red-900/30 p-3 rounded font-bold text-red-400 border border-red-500/30">PONCHE (K)</button>
                        <button onclick="record('pitch', 'OUT', '#64748b')" class="bg-slate-700 p-3 rounded font-bold">OUT</button>
                        <button onclick="record('pitch', 'H', '#f97316')" class="bg-orange-900/30 p-3 rounded font-bold text-orange-400 border border-orange-500/30">HIT RECIBIDO</button>
                        <button onclick="record('pitch', 'BB', '#3b82f6')" class="bg-blue-900/30 p-3 rounded font-bold text-blue-400 border border-blue-500/30">WALK (BB)</button>
                        <button onclick="record('pitch', 'ER', '#dc2626')" class="bg-red-600 p-3 rounded font-bold col-span-1">C. LIMPIA</button>
                        <button onclick="record('pitch', 'UER', '#94a3b8')" class="bg-slate-500 p-3 rounded font-bold col-span-1">C. SUCIA</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                <div class="card p-4 bg-slate-900/50">
                    <h3 class="text-xs font-black text-blue-500 mb-3 uppercase">Historial Bateo</h3>
                    <div id="battingLogs" class="space-y-1 max-h-[400px] overflow-y-auto scroll-custom p-1"></div>
                </div>
                <div class="card p-4 bg-slate-900/50">
                    <h3 class="text-xs font-black text-red-500 mb-3 uppercase">Historial Pitcheo</h3>
                    <div id="pitchingLogs" class="space-y-1 max-h-[400px] overflow-y-auto scroll-custom p-1"></div>
                </div>
            </div>
        </section>

        <section id="section-stats" class="hidden">
            <div id="statsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
        </section>

        <section id="section-setup" class="hidden">
            <div class="card p-6 max-w-md mx-auto">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="playerNameInput" placeholder="Nombre..." class="flex-1 p-3 rounded-lg bg-slate-800 border border-slate-700">
                    <button onclick="addPlayer()" class="bg-blue-600 px-5 py-2 rounded-lg font-black">AÑADIR</button>
                </div>
                <div id="playerList" class="space-y-2"></div>
                <button onclick="clearAll()" class="mt-10 text-red-500 text-xs font-bold block mx-auto underline uppercase">Resetear Todo</button>
            </div>
        </section>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 transform translate-y-24 opacity-0 transition-all bg-white text-slate-900 px-6 py-3 rounded-xl font-bold shadow-2xl z-50"></div>

    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFCmkqnOiDWc5xvPct69euRqVWsbnbYAM",
            authDomain: "mlb-coop.firebaseapp.com",
            projectId: "mlb-coop",
            databaseURL: "https://mlb-coop-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = {
            players: [],
            isGameActive: false,
            inning: 1,
            scoreRuns: 0,
            scoreAllowed: 0,
            batOuts: 0,
            pitchOuts: 0,
            logs: [],
            activeBatter: "",
            activePitcher: "",
            hrTrigger: 0
        };

        const SPRITES = {
            heman: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpxZW5rN3FqN3RxeW9zNnltbmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD1z/3o7TKpXXqZ7XmN4gPS/giphy.gif",
            skeletor: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpxZW5rN3FqN3RxeW9zNnltbmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD1z/3o7TKpN3vV8hR8v98Y/giphy.gif"
        };

        db.ref('mlb_state').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                const oldHR = state.hrTrigger;
                state = data;
                if (state.hrTrigger > oldHR) showHRAnim();
                updateUI();
            }
        });

        function save() { db.ref('mlb_state').set(state); }

        function updateUI() {
            // Marcador
            document.getElementById('score-runs').innerText = state.scoreRuns;
            document.getElementById('score-allowed').innerText = state.scoreAllowed;
            document.getElementById('current-inning').innerText = state.inning;
            
            // Outs Dots
            const bDots = document.getElementById('bat-outs').children;
            const pDots = document.getElementById('pitch-outs').children;
            for(let i=0; i<3; i++) {
                bDots[i].style.backgroundColor = i < state.batOuts ? '#3b82f6' : '#334155';
                pDots[i].style.backgroundColor = i < state.pitchOuts ? '#ef4444' : '#334155';
            }

            // Controls toggle
            const ctrl = document.getElementById('game-controls');
            const btn = document.getElementById('btn-toggle');
            if(state.isGameActive) {
                ctrl.classList.remove('opacity-30', 'pointer-events-none');
                btn.innerText = "FINALIZAR PARTIDO";
                btn.className = "px-10 py-3 rounded-full font-black bg-red-600 shadow-lg";
            } else {
                ctrl.classList.add('opacity-30', 'pointer-events-none');
                btn.innerText = "EMPEZAR PARTIDO";
                btn.className = "px-10 py-3 rounded-full font-black bg-green-600 shadow-lg";
            }

            renderDropdowns();
            renderLogs();
            renderStats();
            renderPlayerSetup();
            updateSprites();
        }

        function record(mode, type, color) {
            const pid = mode === 'bat' ? state.activeBatter : state.activePitcher;
            if(!pid) return showToast("Selecciona jugador");
            const player = state.players.find(p => p.id == pid);

            const event = {
                id: Date.now(),
                mode, // 'bat' o 'pitch'
                type,
                playerName: player.name,
                playerId: pid,
                color,
                inning: state.inning
            };

            if(!state.logs) state.logs = [];
            state.logs.unshift(event);

            // Lógica de avance
            if(mode === 'bat') {
                if(type === 'HR') { state.scoreRuns++; state.hrTrigger++; }
                if(type === 'RBI') { state.scoreRuns++; }
                if(type === 'OUT' || type === 'K') state.batOuts++;
                if(state.batOuts >= 3) { state.batOuts = 0; showToast("¡CAMBIO DE INNING!"); }
                if(type !== 'RBI') rotate('activeBatter');
            } else {
                if(type === 'K' || type === 'OUT') state.pitchOuts++;
                if(type === 'ER') state.scoreAllowed++;
                if(type === 'UER') state.scoreAllowed++;
                if(state.pitchOuts >= 3) { 
                    state.pitchOuts = 0; 
                    state.inning++; 
                    showToast("¡INNING COMPLETADO!"); 
                    rotate('activePitcher');
                }
            }
            save();
        }

        function deleteLog(logId) {
            const index = state.logs.findIndex(l => l.id === logId);
            if(index > -1) {
                const log = state.logs[index];
                // Revertir marcador si era carrera
                if(log.type === 'HR' || log.type === 'RBI') state.scoreRuns--;
                if(log.type === 'ER' || log.type === 'UER') state.scoreAllowed--;
                if(log.type === 'OUT' || log.type === 'K') {
                    if(log.mode === 'bat') state.batOuts = Math.max(0, state.batOuts - 1);
                    else state.pitchOuts = Math.max(0, state.pitchOuts - 1);
                }
                state.logs.splice(index, 1);
                save();
            }
        }

        function rotate(key) {
            const currentIndex = state.players.findIndex(p => p.id == state[key]);
            const nextIndex = (currentIndex + 1) % state.players.length;
            state[key] = state.players[nextIndex].id;
        }

        function renderLogs() {
            const batContainer = document.getElementById('battingLogs');
            const pitchContainer = document.getElementById('pitchingLogs');
            
            const batHtml = (state.logs || []).filter(l => l.mode === 'bat').map(l => `
                <div class="flex justify-between items-center p-2 bg-slate-800 rounded border-l-4 mb-1" style="border-color:${l.color}">
                    <span class="text-xs"><b>Inning ${l.inning}</b> | ${l.playerName}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-black" style="color:${l.color}">${l.type}</span>
                        <button onclick="deleteLog(${l.id})" class="text-xs text-slate-500 hover:text-red-500">❌</button>
                    </div>
                </div>
            `).join('');

            const pitchHtml = (state.logs || []).filter(l => l.mode === 'pitch').map(l => `
                <div class="flex justify-between items-center p-2 bg-slate-800 rounded border-l-4 mb-1" style="border-color:${l.color}">
                    <span class="text-xs"><b>Inning ${l.inning}</b> | ${l.playerName}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-black" style="color:${l.color}">${l.type}</span>
                        <button onclick="deleteLog(${l.id})" class="text-xs text-slate-500 hover:text-red-500">❌</button>
                    </div>
                </div>
            `).join('');

            batContainer.innerHTML = batHtml;
            pitchContainer.innerHTML = pitchHtml;
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = state.players.map(p => {
                const logs = (state.logs || []);
                const myBatLogs = logs.filter(l => l.playerId == p.id && l.mode === 'bat');
                const myPitchLogs = logs.filter(l => l.playerId == p.id && l.mode === 'pitch');

                // Bateo
                const ab = myBatLogs.filter(l => ['H','2B','3B','HR','OUT','K'].includes(l.type)).length;
                const h = myBatLogs.filter(l => ['H','2B','3B','HR'].includes(l.type)).length;
                const hr = myBatLogs.filter(l => l.type === 'HR').length;
                const rbi = myBatLogs.filter(l => l.type === 'RBI' || l.type === 'HR').length;
                const avg = ab > 0 ? (h / ab).toFixed(3).substring(1) : ".000";

                // Pitcheo (ERA)
                const outs = myPitchLogs.filter(l => ['K','OUT'].includes(l.type)).length;
                const er = myPitchLogs.filter(l => l.type === 'ER').length;
                const inningsP = outs / 3;
                const era = inningsP > 0 ? ((er * 9) / inningsP).toFixed(2) : "0.00";

                return `
                <div class="card p-5 border-l-4 ${p.name.toLowerCase().includes('beto') ? 'border-blue-500' : 'border-red-500'}">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black uppercase">${p.name}</h3>
                        <div class="flex gap-4">
                            <span class="text-xs bg-blue-600 px-2 py-1 rounded">AVG: ${avg}</span>
                            <span class="text-xs bg-red-600 px-2 py-1 rounded">ERA: ${era}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center">
                        <div><p class="text-[9px] text-slate-400">H</p><p class="font-bold">${h}</p></div>
                        <div><p class="text-[9px] text-slate-400">HR</p><p class="font-bold">${hr}</p></div>
                        <div><p class="text-[9px] text-slate-400">RBI</p><p class="font-bold">${rbi}</p></div>
                        <div><p class="text-[9px] text-slate-400">ER</p><p class="font-bold text-red-400">${er}</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- Funciones de utilidad ---
        function toggleGame() {
            if(!state.isGameActive) {
                if(state.players.length === 0) return;
                state.isGameActive = true;
                state.inning = 1;
                state.scoreRuns = 0; state.scoreAllowed = 0;
                state.batOuts = 0; state.pitchOuts = 0;
                state.logs = [];
                state.activeBatter = state.players[0].id;
                state.activePitcher = state.players[0].id;
            } else {
                if(!confirm("¿Finalizar?")) return;
                state.isGameActive = false;
            }
            save();
        }

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            if(input.value) {
                state.players.push({ id: Date.now(), name: input.value });
                input.value = "";
                save();
            }
        }

        function renderPlayerSetup() {
            document.getElementById('playerList').innerHTML = state.players.map(p => `
                <div class="flex justify-between p-2 bg-slate-800 rounded">
                    <span>${p.name}</span>
                    <button onclick="state.players = state.players.filter(x=>x.id != ${p.id}); save()" class="text-red-500">✕</button>
                </div>
            `).join('');
        }

        function renderDropdowns() {
            const options = state.players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            document.getElementById('activeBatter').innerHTML = options;
            document.getElementById('activePitcher').innerHTML = options;
            document.getElementById('activeBatter').value = state.activeBatter;
            document.getElementById('activePitcher').value = state.activePitcher;
        }

        function manualUserChange() {
            state.activeBatter = document.getElementById('activeBatter').value;
            state.activePitcher = document.getElementById('activePitcher').value;
            save();
        }

        function updateSprites() {
            const b = state.players.find(p => p.id == state.activeBatter)?.name.toLowerCase() || "";
            const p = state.players.find(p => p.id == state.activePitcher)?.name.toLowerCase() || "";
            document.getElementById('batter-sprite-container').innerHTML = b.includes('beto') ? `<img src="${SPRITES.heman}" class="character-sprite">` : (b.includes('nasa') ? `<img src="${SPRITES.skeletor}" class="character-sprite">` : "");
            document.getElementById('pitcher-sprite-container').innerHTML = p.includes('nasa') ? `<img src="${SPRITES.skeletor}" class="character-sprite">` : (p.includes('beto') ? `<img src="${SPRITES.heman}" class="character-sprite">` : "");
        }

        function showHRAnim() {
            const ov = document.getElementById('hr-overlay');
            ov.style.display = 'flex';
            setTimeout(() => ov.style.display = 'none', 3000);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.remove('opacity-0', 'translate-y-24');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-24'), 2000);
        }

        function viewSection(id) {
            ['game', 'stats', 'setup'].forEach(s => document.getElementById('section-'+s).classList.add('hidden'));
            document.getElementById('section-'+id).classList.remove('hidden');
            ['game', 'stats', 'setup'].forEach(s => document.getElementById('nav-'+s).classList.remove('bg-blue-600'));
            document.getElementById('nav-'+id).classList.add('bg-blue-600');
        }

        function clearAll() { if(confirm("¿Borrar todo?")) { state.logs = []; state.players = []; state.isGameActive = false; save(); } }
    </script>
</body>
</html>
