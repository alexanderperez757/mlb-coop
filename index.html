<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB THE SHOW 26 COOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; transition: background-color 0.3s; overflow-x: hidden; }
        .card { background-color: #1e293b; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
        .scoreboard-font { font-family: 'Courier New', Courier, monospace; }
        
        #hr-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; align-items: center; justify-content: center;
            flex-direction: column; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hr-text {
            font-size: 5rem; font-weight: 900; color: #fbbf24;
            text-shadow: 0 0 20px #fbbf24, 0 0 40px #d97706;
            animation: hr-bounce 0.5s infinite alternate;
        }
        @keyframes hr-bounce { from { transform: scale(1); } to { transform: scale(1.05); } }

        .out-dot { width: 14px; height: 14px; border-radius: 9999px; transition: all 0.3s; border: 2px solid rgba(255,255,255,0.1); }
        .character-sprite { width: 60px; height: 60px; object-fit: contain; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="hr-overlay">
        <div class="hr-text italic">HOME RUN!</div>
        <div class="mt-4 text-white text-2xl font-bold uppercase tracking-widest">¡HASTA LA LUNA! ⚾✨</div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">MLB THE SHOW <span class="text-blue-500">26 COOP</span></h1>
                <p class="text-slate-400 font-medium italic">Beto vs Nasa Edition</p>
            </div>
            <div class="flex gap-2 bg-slate-800 p-1 rounded-xl">
                <button onclick="viewSection('game')" class="nav-btn px-4 py-2 rounded-lg font-semibold transition-all bg-blue-600 text-white" id="nav-game">🎮 Juego</button>
                <button onclick="viewSection('stats')" class="nav-btn px-4 py-2 rounded-lg font-semibold transition-all text-slate-400" id="nav-stats">📊 Histórico</button>
                <button onclick="viewSection('setup')" class="nav-btn px-4 py-2 rounded-lg font-semibold transition-all text-slate-400" id="nav-setup">⚙️ Equipo</button>
            </div>
        </header>

        <div id="live-scoreboard" class="card p-5 mb-6 border-b-4 border-blue-600 bg-slate-900">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex flex-col gap-3">
                    <div class="flex items-center gap-3">
                        <div id="game-status-indicator" class="px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest bg-red-500/20 text-red-400 border border-red-500/50 w-fit">
                            ESPERANDO PARTIDO
                        </div>
                        <div id="inning-display" class="bg-blue-600 px-3 py-1 rounded-md text-xs font-black text-white">INNING: 1</div>
                    </div>
                    <div class="flex gap-8">
                        <div>
                            <p class="text-[10px] text-blue-400 font-black uppercase mb-2">Outs Bateando</p>
                            <div id="bat-outs" class="flex gap-2">
                                <div class="out-dot bg-slate-700"></div><div class="out-dot bg-slate-700"></div><div class="out-dot bg-slate-700"></div>
                            </div>
                        </div>
                        <div>
                            <p class="text-[10px] text-red-500 font-black uppercase mb-2">Outs Pitcheando</p>
                            <div id="pitch-outs" class="flex gap-2">
                                <div class="out-dot bg-slate-700"></div><div class="out-dot bg-slate-700"></div><div class="out-dot bg-slate-700"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex gap-8 md:gap-12 items-center bg-slate-800/50 px-8 py-4 rounded-2xl border border-slate-700">
                    <div class="text-center">
                        <p class="text-[10px] text-blue-400 font-black uppercase mb-1">Anotadas</p>
                        <span id="score-runs" class="scoreboard-font text-5xl text-white">0</span>
                    </div>
                    <div class="text-slate-600 text-3xl font-black">VS</div>
                    <div class="text-center">
                        <p class="text-[10px] text-red-500 font-black uppercase mb-1">Permitidas</p>
                        <span id="score-allowed" class="scoreboard-font text-5xl text-white">0</span>
                    </div>
                </div>
            </div>
        </div>

        <section id="section-game" class="space-y-6">
            <div class="flex flex-col sm:flex-row justify-center gap-4 mb-4">
                <button id="btn-toggle-game" onclick="toggleGame()" class="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-full font-black text-lg shadow-lg flex items-center gap-3">
                    <span id="game-btn-icon">🏏</span> <span id="game-btn-text">EMPEZAR PARTIDO</span>
                </button>
            </div>

            <div id="game-controls" class="opacity-30 pointer-events-none grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card p-6 border-t-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">🏏 Lineup</h2>
                        <div id="batter-sprite-container" class="h-12"></div>
                    </div>
                    <select id="activeBatter" onchange="manualUserChange()" class="w-full p-4 mb-4 rounded-xl bg-slate-900 border border-slate-700 text-white font-black text-xl"></select>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="recordBatting('H', '#16a34a')" class="p-3 bg-green-600/20 border border-green-600/50 rounded-lg font-bold text-green-400">1B</button>
                        <button onclick="recordBatting('2B', '#059669')" class="p-3 bg-emerald-600/20 border border-emerald-600/50 rounded-lg font-bold text-emerald-400">2B</button>
                        <button onclick="recordBatting('3B', '#ea580c')" class="p-3 bg-orange-600/20 border border-orange-600/50 rounded-lg font-bold text-orange-400">3B</button>
                        <button onclick="recordBatting('HR', '#eab308')" class="p-3 bg-yellow-600/20 border border-yellow-600/50 rounded-lg font-bold text-yellow-400">HR</button>
                        <button onclick="recordBatting('BB', '#2563eb')" class="p-3 bg-blue-600/20 border border-blue-600/50 rounded-lg font-bold text-blue-400">BB</button>
                        <button onclick="recordBatting('RBI', '#9333ea')" class="p-3 bg-purple-600/20 border border-purple-600/50 rounded-lg font-bold text-purple-400">RBI</button>
                        <button onclick="recordBatting('OUT', '#475569')" class="p-3 bg-slate-700 rounded-lg font-bold">OUT</button>
                        <button onclick="recordBatting('K', '#dc2626')" class="p-3 bg-red-600/20 border border-red-600/50 rounded-lg font-bold text-red-400">K</button>
                        <button onclick="nextInning()" class="p-3 bg-slate-800 border border-slate-600 rounded-lg font-bold text-white">SIG. INNING</button>
                    </div>
                </div>

                <div class="card p-6 border-t-4 border-red-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">⚾ Bullpen</h2>
                        <div id="pitcher-sprite-container" class="h-12"></div>
                    </div>
                    <select id="activePitcher" onchange="manualUserChange()" class="w-full p-4 mb-4 rounded-xl bg-slate-900 border border-slate-700 text-white font-black text-xl"></select>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="recordPitching('K', '#dc2626')" class="p-4 bg-red-600/20 border border-red-600/50 rounded-xl font-bold text-red-400">PONCHE (K)</button>
                        <button onclick="recordPitching('OUT', '#475569')" class="p-4 bg-slate-700 border border-slate-600 rounded-xl font-bold">OUT</button>
                        <button onclick="recordPitching('HIT', '#ea580c')" class="p-4 bg-orange-600/20 border border-orange-600/50 rounded-xl font-bold text-orange-400">HIT</button>
                        <button onclick="recordPitching('BB', '#2563eb')" class="p-4 bg-blue-600/20 border border-blue-600/50 rounded-xl font-bold text-blue-400">BB</button>
                        <button onclick="recordPitching('ER', '#fca5a5')" class="p-4 bg-red-900/40 border border-red-900/50 rounded-xl font-bold text-red-200 col-span-2">CARRERA PERMITIDA</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-stats" class="hidden space-y-6">
            <div class="flex justify-between items-center border-b-2 border-blue-600 pb-2">
                <h2 class="text-2xl font-black text-white uppercase">Estadísticas de Temporada</h2>
                <button onclick="resetSeasonStats()" class="bg-red-600 hover:bg-red-700 text-[10px] font-black px-4 py-2 rounded-lg">RESETEAR NÚMEROS</button>
            </div>
            <div id="statsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </section>

        <section id="section-setup" class="hidden">
            <div class="card p-6 max-w-md mx-auto">
                <h2 class="text-xl font-bold mb-4 text-center italic">Gestionar Equipo</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="playerNameInput" placeholder="Nombre..." class="flex-1 p-3 rounded-lg bg-slate-800 border border-slate-700 text-white">
                    <button onclick="addPlayer()" class="btn-primary px-5 py-2 rounded-lg font-black">AÑADIR</button>
                </div>
                <div id="playerList" class="space-y-2"></div>
                <button onclick="clearHistory()" class="mt-8 text-red-500 text-xs font-black block mx-auto uppercase underline tracking-widest">Borrar Base de Datos</button>
            </div>
        </section>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 transform translate-y-24 opacity-0 transition-all duration-300 bg-white text-slate-900 px-8 py-4 rounded-2xl shadow-2xl font-black z-50 border-4 border-blue-600"></div>

    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFCmkqnOiDWc5xvPct69euRqVWsbnbYAM",
            authDomain: "mlb-coop.firebaseapp.com",
            projectId: "mlb-coop",
            databaseURL: "https://mlb-coop-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let players = [];
        let isGameActive = false;
        let currentGameScore = { runs: 0, allowed: 0, pitchOuts: 0, batOuts: 0, inning: 1 };
        let activeSelection = { batterId: "", pitcherId: "" };

        function save() {
            db.ref('gameData').set({ players, score: currentGameScore, isGameActive, activeSelection });
        }

        db.ref('gameData').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                players = data.players || [];
                currentGameScore = data.score || { runs: 0, allowed: 0, pitchOuts: 0, batOuts: 0, inning: 1 };
                isGameActive = data.isGameActive || false;
                activeSelection = data.activeSelection || { batterId: "", pitcherId: "" };
                updateUI();
            }
        });

        function updateUI() {
            document.getElementById('score-runs').innerText = currentGameScore.runs;
            document.getElementById('score-allowed').innerText = currentGameScore.allowed;
            document.getElementById('inning-display').innerText = `INNING: ${currentGameScore.inning}`;
            
            const bDots = document.getElementById('bat-outs').children;
            const pDots = document.getElementById('pitch-outs').children;
            for(let i=0; i<3; i++) {
                bDots[i].style.backgroundColor = i < currentGameScore.batOuts ? '#3b82f6' : '#334155';
                pDots[i].style.backgroundColor = i < currentGameScore.pitchOuts ? '#ef4444' : '#334155';
            }

            updateStatusUI();
            renderStats();
            renderPlayerList();
            updateDropdowns();
        }

        function recordBatting(type, color) {
            const pid = activeSelection.batterId;
            if(!pid) return;
            const p = players.find(x => x.id == pid);
            if(!p.stats.extra) p.stats.extra = { h1: 0, h2: 0, h3: 0, bb: 0, outs: 0 };

            if (['H','2B','3B','HR','OUT','K'].includes(type)) p.stats.atBats++;
            if (['H','2B','3B','HR'].includes(type)) { p.stats.hits++; }
            
            if (type === 'H') p.stats.extra.h1++;
            if (type === '2B') p.stats.extra.h2++;
            if (type === '3B') p.stats.extra.h3++;
            if (type === 'BB') p.stats.extra.bb++;
            if (type === 'HR') { p.stats.hr++; p.stats.rbi++; currentGameScore.runs++; showHR(); }
            if (type === 'RBI') { p.stats.rbi++; currentGameScore.runs++; }
            if (type === 'OUT' || type === 'K') { p.stats.extra.outs++; currentGameScore.batOuts++; }

            if (type !== 'RBI') rotatePlayer('batter');
            if (currentGameScore.batOuts >= 3) { currentGameScore.batOuts = 0; showToast("CAMBIO DE LADO"); }
            save();
        }

        function recordPitching(type, color) {
            const pid = activeSelection.pitcherId;
            if(!pid) return;
            const p = players.find(x => x.id == pid);

            if (type === 'K') { p.stats.pk++; currentGameScore.pitchOuts++; }
            if (type === 'OUT') currentGameScore.pitchOuts++;
            if (type === 'ER') { p.stats.pruns++; currentGameScore.allowed++; }
            if (type === 'HIT' || type === 'BB') { /* Opcional: trackear hits recibidos */ }

            if (currentGameScore.pitchOuts >= 3) {
                currentGameScore.pitchOuts = 0;
                rotatePlayer('pitcher');
                showToast("INNING TERMINADO");
            }
            save();
        }

        function renderStats() {
            document.getElementById('statsContainer').innerHTML = players.map(p => {
                const rawAvg = p.stats.atBats > 0 ? (p.stats.hits / p.stats.atBats).toFixed(3) : "000";
                const avgDisplay = rawAvg.toString().replace("0.", "").replace("1.000", "1000");
                
                // Cálculo ERA: (Carreras / Outs) * 3
                const totalOuts = p.stats.pk + (p.stats.extra?.outs_pitched || 0); // Simplificado por ahora a outs de sistema
                // Para este sistema usamos una aproximación basada en carreras permitidas
                const era = p.stats.pruns > 0 ? ((p.stats.pruns * 3) / Math.max(1, (p.stats.pk/2))).toFixed(2) : "0.00";

                return `
                <div class="card p-5 border-l-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-black uppercase">${p.name}</h3>
                        <div class="flex gap-2">
                            <span class="bg-blue-600 px-2 py-1 rounded text-[10px] font-bold text-white">AVG: ${avgDisplay}</span>
                            <span class="bg-red-600 px-2 py-1 rounded text-[10px] font-bold text-white">ERA: ${era}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center">
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">VB</p>
                            <p class="text-md font-bold">${p.stats.atBats}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">H</p>
                            <p class="text-md font-bold">${p.stats.hits}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">2B/3B</p>
                            <p class="text-md font-bold">${(p.stats.extra?.h2||0)}/${(p.stats.extra?.h3||0)}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">HR</p>
                            <p class="text-md font-bold">${p.stats.hr}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">RBI</p>
                            <p class="text-md font-bold">${p.stats.rbi}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">BB</p>
                            <p class="text-md font-bold">${p.stats.extra?.bb||0}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">K Pitch</p>
                            <p class="text-md font-bold">${p.stats.pk}</p>
                        </div>
                        <div class="bg-slate-800 p-2 rounded">
                            <p class="text-[8px] text-slate-400 uppercase">C. Perm</p>
                            <p class="text-md font-bold text-red-400">${p.stats.pruns}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function nextInning() {
            currentGameScore.inning++;
            currentGameScore.batOuts = 0;
            currentGameScore.pitchOuts = 0;
            showToast(`INNING ${currentGameScore.inning}`);
            save();
        }

        function resetSeasonStats() {
            if(confirm("¿Seguro que quieres poner todos los números en 0?")) {
                players.forEach(p => {
                    p.stats = { atBats:0, hits:0, hr:0, rbi:0, pk:0, pruns:0, extra: {h1:0, h2:0, h3:0, bb:0, outs:0} };
                });
                save();
            }
        }

        function toggleGame() {
            if (!isGameActive) {
                if (players.length === 0) return;
                isGameActive = true;
                currentGameScore = { runs: 0, allowed: 0, pitchOuts: 0, batOuts: 0, inning: 1 };
                activeSelection = { batterId: players[0].id, pitcherId: players[0].id };
            } else {
                if (!confirm("¿Finalizar partido?")) return;
                isGameActive = false;
            }
            save();
        }

        function rotatePlayer(type) {
            if (players.length < 2) return;
            const currentId = activeSelection[type === 'batter' ? 'batterId' : 'pitcherId'];
            let currentIndex = players.findIndex(p => p.id == currentId);
            let nextIndex = (currentIndex + 1) % players.length;
            activeSelection[type === 'batter' ? 'batterId' : 'pitcherId'] = players[nextIndex].id;
        }

        function updateDropdowns() {
            const bSelect = document.getElementById('activeBatter');
            const pSelect = document.getElementById('activePitcher');
            const options = '<option value="">ELIJE JUGADOR</option>' + players.map(p => `<option value="${p.id}">${p.name.toUpperCase()}</option>`).join('');
            bSelect.innerHTML = options;
            pSelect.innerHTML = options;
            if(activeSelection.batterId) bSelect.value = activeSelection.batterId;
            if(activeSelection.pitcherId) pSelect.value = activeSelection.pitcherId;
        }

        function manualUserChange() {
            activeSelection.batterId = document.getElementById('activeBatter').value;
            activeSelection.pitcherId = document.getElementById('activePitcher').value;
            save();
        }

        function updateStatusUI() {
            const controls = document.getElementById('game-controls');
            const btn = document.getElementById('btn-toggle-game');
            const indicator = document.getElementById('game-status-indicator');
            if (isGameActive) {
                controls.classList.remove('opacity-30', 'pointer-events-none');
                document.getElementById('game-btn-text').innerText = "FINALIZAR PARTIDO";
                btn.className = "px-8 py-3 bg-red-600 hover:bg-red-500 text-white rounded-full font-black text-lg shadow-lg flex items-center gap-3";
                indicator.innerText = "• PARTIDO EN VIVO •";
                indicator.className = "px-4 py-1 rounded-full text-xs font-black bg-green-500/20 text-green-400 border border-green-500/50 w-fit";
            } else {
                controls.classList.add('opacity-30', 'pointer-events-none');
                document.getElementById('game-btn-text').innerText = "EMPEZAR PARTIDO";
                btn.className = "px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-full font-black text-lg shadow-lg flex items-center gap-3";
                indicator.innerText = "ESPERANDO PARTIDO";
                indicator.className = "px-4 py-1 rounded-full text-xs font-black bg-red-500/20 text-red-400 border border-red-500/50 w-fit";
            }
        }

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            const name = input.value.trim();
            if (name) {
                players.push({ id: Date.now(), name, stats: { atBats:0, hits:0, hr:0, rbi:0, pk:0, pruns:0, extra: {h1:0, h2:0, h3:0, bb:0, outs:0} } });
                input.value = '';
                save();
            }
        }

        function renderPlayerList() {
            document.getElementById('playerList').innerHTML = players.map(p => `
                <div class="flex justify-between p-3 bg-slate-800 rounded-xl mb-2 border border-slate-700">
                    <span>👤 ${p.name}</span>
                    <button onclick="removePlayer(${p.id})" class="text-red-400">✕</button>
                </div>
            `).join('');
        }

        function removePlayer(id) { if(confirm("¿Eliminar jugador de la base de datos?")) { players = players.filter(p => p.id !== id); save(); } }

        function viewSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            document.getElementById('nav-' + id).classList.add('bg-blue-600', 'text-white');
        }

        function clearHistory() {
            if(confirm("ESTO BORRARÁ TODO (JUGADORES Y NÚMEROS). ¿CONTINUAR?")) {
                players = []; isGameActive = false;
                currentGameScore = { runs: 0, allowed: 0, pitchOuts: 0, batOuts: 0, inning: 1 };
                activeSelection = { batterId: "", pitcherId: "" };
                save();
            }
        }

        function showHR() {
            const ov = document.getElementById('hr-overlay');
            ov.style.display = 'flex';
            setTimeout(() => ov.style.display = 'none', 2500);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.remove('opacity-0', 'translate-y-24');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-24'), 2000);
        }

        window.onload = () => viewSection('game');
    </script>
</body>
</html>
